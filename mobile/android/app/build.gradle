apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
    // Autolinking of native modules (react-native-webrtc, react-native-iap,
    // etc.) is wired up in settings.gradle + the native_modules.gradle
    // apply below, not through this block.
}

def enableProguardInReleaseBuilds = true
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.videochatapp"
    defaultConfig {
        applicationId "com.videochatapp"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
        // react-native-iap ships separate Google Play / Amazon Appstore
        // flavors; this app only targets the Play Store.
        missingDimensionStrategy 'store', 'play'
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            // Fill these in (or better, pass via -P / env vars / a local
            // keystore.properties file that is NOT committed to git) before
            // building a release AAB/APK for the Play Store. See mobile/README.md.
            if (project.hasProperty('VIDEOCHAT_UPLOAD_STORE_FILE')) {
                storeFile file(VIDEOCHAT_UPLOAD_STORE_FILE)
                storePassword VIDEOCHAT_UPLOAD_STORE_PASSWORD
                keyAlias VIDEOCHAT_UPLOAD_KEY_ALIAS
                keyPassword VIDEOCHAT_UPLOAD_KEY_PASSWORD
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig project.hasProperty('VIDEOCHAT_UPLOAD_STORE_FILE') ? signingConfigs.release : signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(project)
